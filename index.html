<!doctype html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>わらび餅キング | ドキュメント</title>
	<meta name="description" content="わらび餅キングのドキュメント一覧ページです。">
	<style>
		:root {
			color-scheme: light;
			--bg: #f7f7f2;
			--panel: #ffffff;
			--text: #24211f;
			--muted: #5f5954;
			--accent: #0a7a55;
			--accent-hover: #07563c;
			--border: #e7e2dc;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
			line-height: 1.7;
			color: var(--text);
			background: radial-gradient(circle at 10% 10%, #fff7d9 0%, transparent 40%),
									radial-gradient(circle at 90% 90%, #dff6ec 0%, transparent 35%),
									var(--bg);
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
		}

		main {
			width: min(760px, 100%);
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 18px;
			padding: clamp(20px, 4vw, 36px);
			box-shadow: 0 12px 36px rgba(0, 0, 0, 0.07);
		}

		h1 {
			margin: 0 0 10px;
			font-size: clamp(1.5rem, 4vw, 2rem);
			line-height: 1.3;
		}

		p {
			margin: 0;
			color: var(--muted);
		}

		ul {
			list-style: none;
			padding: 0;
			margin: 24px 0 0;
			display: grid;
			gap: 12px;
		}

		a {
			display: block;
			padding: 14px 16px;
			border-radius: 12px;
			border: 1px solid var(--border);
			color: var(--accent);
			text-decoration: none;
			font-weight: 700;
			transition: transform 120ms ease, border-color 120ms ease, color 120ms ease;
			background: #fff;
		}

		a:hover,
		a:focus-visible {
			transform: translateY(-1px);
			border-color: var(--accent);
			color: var(--accent-hover);
			outline: none;
		}
	</style>
</head>
<body>
	<main>
		<h1>わらび餅キング ドキュメント</h1>
		<p>GitHub Pages で公開するドキュメント一覧です。</p>
		<ul>
			<li><a href="./sync/privacy-policy.html">プライバシーポリシー</a></li>
			<li><a href="./sync/terms.html">利用規約</a></li>
		</ul>
	</main>
</body>
</html>
